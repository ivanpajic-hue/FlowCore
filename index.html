<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowCore — Task management sistem za Balkan Transport</title>
<!--
  FlowCore v1.0 (MVP)
  Task management sistem za Balkan Transport
  Jedan fajl: HTML + CSS + JS, Supabase (PostgreSQL + Auth) kao online baza.
  v2.0 — migrirano sa localStorage na Supabase (SQL šema u komentaru na dnu fajla).
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#0e1b33; --navy-2:#16274a; --blue:#2563eb; --blue-soft:#e8effd;
  --mint:#10b981; --mint-soft:#e7f8f1; --amber:#f59e0b; --amber-soft:#fdf3e0;
  --red:#ef4444; --red-soft:#fdeaea; --violet:#7c3aed;
  --bg:#f4f6fa; --card:#ffffff; --line:#e5e9f0;
  --text:#1e293b; --muted:#64748b; --radius:12px;
  --shadow:0 1px 3px rgba(15,27,51,.07),0 6px 18px rgba(15,27,51,.05);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
a{color:var(--blue);text-decoration:none}
h1{font-size:22px}h2{font-size:18px}h3{font-size:15px}
.hidden{display:none!important}
.muted{color:var(--muted)}
.small{font-size:12px}

/* ---------- LOGIN ---------- */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,#1a3a6b 60%,#2563eb 130%);padding:20px}
.login-card{background:var(--card);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.35);width:100%;max-width:440px;padding:36px 32px}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.logo-mark{width:42px;height:42px;border-radius:11px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;letter-spacing:-.5px}
.logo-mark span{color:#5ea0ff}
.login-card h1{font-size:24px;letter-spacing:-.4px}
.login-sub{color:var(--muted);margin:2px 0 24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;background:#fbfcfe;outline:none;transition:border .15s,box-shadow .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.13);background:#fff}
.btn{border:none;border-radius:9px;padding:10px 16px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px;transition:filter .12s,transform .05s;background:#eef1f6;color:var(--text)}
.btn:hover{filter:brightness(.96)}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--blue);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--line)}
.btn-sm{padding:6px 10px;font-size:12.5px;border-radius:7px}
.btn-block{width:100%;justify-content:center}
.quick-users{margin-top:22px;border-top:1px solid var(--line);padding-top:16px}
.quick-users p{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.quick-user{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:7px}
.quick-user:hover{border-color:var(--blue);background:var(--blue-soft)}
.avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex:none}
.quick-user b{display:block;font-size:13px}
.quick-user span{font-size:11.5px;color:var(--muted)}
.login-error{background:var(--red-soft);color:#b91c1c;border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:12px}

/* ---------- APP SHELL ---------- */
#appShell{display:flex;min-height:100vh}
.sidebar{width:236px;background:var(--navy);color:#c6d2e8;flex:none;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:40;overflow-y:auto}
.sidebar .brand{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;color:#fff}
.sidebar .brand b{font-size:16px;letter-spacing:-.3px}
.sidebar .brand small{display:block;font-size:10.5px;color:#8fa3c8;font-weight:400}
.nav-group{padding:6px 10px;font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:#5f7398;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:8px;color:#c6d2e8;background:none;border:none;width:calc(100% - 16px);text-align:left;font-size:13.5px;font-weight:500}
.nav-item svg{width:17px;height:17px;flex:none;opacity:.8}
.nav-item:hover{background:var(--navy-2);color:#fff}
.nav-item.active{background:var(--blue);color:#fff}
.sidebar .side-footer{margin-top:auto;padding:14px;border-top:1px solid #1d2f55;font-size:12px;color:#7d92b8}
.main{flex:1;margin-left:236px;display:flex;flex-direction:column;min-width:0}

/* topbar */
.topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:10px 22px;min-height:58px}
.topbar h1{font-size:18px;letter-spacing:-.3px;white-space:nowrap}
.topbar .spacer{flex:1}
.search-wrap{position:relative;flex:0 1 320px}
.search-wrap input{width:100%;border:1px solid var(--line);border-radius:20px;padding:8px 14px 8px 34px;background:#f7f9fc;outline:none}
.search-wrap input:focus{border-color:var(--blue);background:#fff}
.search-wrap svg{position:absolute;left:11px;top:9px;width:15px;height:15px;color:var(--muted)}
.icon-btn{position:relative;background:#f2f5f9;border:1px solid var(--line);border-radius:50%;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center}
.icon-btn svg{width:17px;height:17px}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:9px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.topbar .me{display:flex;align-items:center;gap:9px;background:none;border:none;padding:4px 6px;border-radius:9px}
.topbar .me:hover{background:#f2f5f9}
.topbar .me b{font-size:13px}
.topbar .me span{display:block;font-size:11px;color:var(--muted)}

/* notifications panel */
.notif-panel{position:absolute;top:54px;right:20px;width:340px;max-height:420px;overflow-y:auto;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);z-index:60}
.notif-panel header{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line);font-weight:600}
.notif-item{padding:10px 14px;border-bottom:1px solid #f0f3f8;font-size:13px;display:flex;gap:9px;cursor:pointer}
.notif-item:hover{background:#f7f9fc}
.notif-item.unread{background:var(--blue-soft)}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);margin-top:5px;flex:none}
.notif-item.read .notif-dot{background:#cbd5e1}
.notif-item time{display:block;font-size:11px;color:var(--muted);margin-top:2px}

/* content */
.content{padding:22px;max-width:1400px;width:100%;margin:0 auto}
.page-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.grid-kpi{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:13px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .k-label{font-size:12px;color:var(--muted);font-weight:600}
.kpi .k-value{font-size:26px;font-weight:800;letter-spacing:-.6px;margin-top:3px}
.kpi .k-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
.kpi.k-mint::before{background:var(--mint)}.kpi.k-amber::before{background:var(--amber)}
.kpi.k-red::before{background:var(--red)}.kpi.k-navy::before{background:var(--navy)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
.card h3{margin-bottom:12px;display:flex;align-items:center;gap:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.chart-box{position:relative;height:240px}
.css-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12.5px}
.css-bar-row .lbl{width:120px;flex:none;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.css-bar-track{flex:1;background:#eef1f6;border-radius:6px;height:16px;overflow:hidden}
.css-bar-fill{height:100%;border-radius:6px;background:var(--blue);min-width:2px}
.css-bar-row .val{width:34px;text-align:right;font-weight:700}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;border-radius:6px;padding:3px 8px;white-space:nowrap}
.b-status-novo{background:#eef1f6;color:#475569}
.b-status-dodeljeno{background:var(--blue-soft);color:#1d4ed8}
.b-status-utoku{background:#ede9fe;color:#6d28d9}
.b-status-ceka{background:var(--amber-soft);color:#b45309}
.b-status-blokirano{background:var(--red-soft);color:#b91c1c}
.b-status-zavrseno{background:var(--mint-soft);color:#047857}
.b-status-otkazano{background:#f1f5f9;color:#94a3b8;text-decoration:line-through}
.b-status-arhivirano{background:#f1f5f9;color:#94a3b8}
.b-pri-nizak{background:#f1f5f9;color:#64748b}
.b-pri-normalan{background:var(--blue-soft);color:#1d4ed8}
.b-pri-visok{background:var(--amber-soft);color:#b45309}
.b-pri-kritican{background:var(--red);color:#fff}
.b-late{background:var(--red-soft);color:#b91c1c}
.b-ok{background:var(--mint-soft);color:#047857}
.b-dept{background:#f1f5f9;color:#475569}

/* table */
.table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:820px}
th{background:#f7f9fc;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f0f3f8;vertical-align:middle}
tbody tr:hover{background:#f9fbfe}
td .t-title{font-weight:600;cursor:pointer}
td .t-title:hover{color:var(--blue)}
.row-actions{display:flex;gap:5px;white-space:nowrap}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.filters select,.filters input{border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:#fff;font-size:13px;outline:none}
.chip{border:1px solid var(--line);background:#fff;border-radius:16px;padding:6px 13px;font-size:12.5px;font-weight:600;color:var(--muted)}
.chip.active{background:var(--navy);border-color:var(--navy);color:#fff}

/* kanban */
.kanban{display:flex;gap:13px;overflow-x:auto;padding-bottom:14px;align-items:flex-start}
.kb-col{background:#eef1f6;border-radius:var(--radius);width:272px;flex:none;padding:10px}
.kb-col h4{font-size:12.5px;display:flex;justify-content:space-between;align-items:center;padding:2px 4px 9px;color:#475569;text-transform:uppercase;letter-spacing:.4px}
.kb-col h4 .cnt{background:#fff;border-radius:10px;padding:1px 8px;font-size:11px}
.kb-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 11px;margin-bottom:9px;box-shadow:0 1px 2px rgba(15,27,51,.06);cursor:pointer}
.kb-card:hover{border-color:var(--blue)}
.kb-card .kb-title{font-weight:600;font-size:13px;margin-bottom:7px}
.kb-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.kb-foot{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--muted)}
.kb-foot select{border:1px solid var(--line);border-radius:6px;font-size:11px;padding:2px 4px;max-width:110px}

/* calendar */
.cal-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{font-size:11px;font-weight:700;color:var(--muted);text-align:center;text-transform:uppercase;padding:4px 0}
.cal-day{background:#fff;border:1px solid var(--line);border-radius:9px;min-height:74px;padding:6px;font-size:12px;cursor:pointer;position:relative}
.cal-day:hover{border-color:var(--blue)}
.cal-day.other{opacity:.38}
.cal-day.today{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.18)}
.cal-day.selected{background:var(--blue-soft)}
.cal-day .d-num{font-weight:700}
.cal-pill{margin-top:5px;background:var(--blue);color:#fff;border-radius:8px;font-size:10.5px;font-weight:700;padding:1px 7px;display:inline-block}
.cal-pill.late{background:var(--red)}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(14,27,51,.5);z-index:70;display:flex;align-items:flex-start;justify-content:center;padding:34px 14px;overflow-y:auto}
.modal{background:#fff;border-radius:14px;width:100%;max-width:680px;box-shadow:0 24px 70px rgba(0,0,0,.3);animation:pop .16s ease}
@keyframes pop{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.modal header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;border-bottom:1px solid var(--line)}
.modal header h2{font-size:16px}
.modal .modal-body{padding:18px 20px;max-height:70vh;overflow-y:auto}
.modal footer{display:flex;justify-content:flex-end;gap:9px;padding:13px 20px;border-top:1px solid var(--line)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.form-grid .full{grid-column:1/-1}
.check-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f0f3f8;font-size:13px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue)}
.check-row .req{font-size:10px;background:var(--amber-soft);color:#b45309;border-radius:5px;padding:1px 6px;font-weight:700}
.check-row.done label{text-decoration:line-through;color:var(--muted)}
.comment{border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:9px;background:#fbfcfe}
.comment .c-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.comment .c-head b{color:var(--navy)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 16px;margin-bottom:14px;font-size:13px}
.detail-grid .dg-item span{display:block;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.mention{color:var(--blue);font-weight:700}
.tag{background:#eef1f6;border-radius:6px;padding:2px 8px;font-size:11.5px;color:#475569;font-weight:600}

/* toast */
#toastWrap{position:fixed;bottom:22px;right:22px;z-index:90;display:flex;flex-direction:column;gap:9px}
.toast{background:var(--navy);color:#fff;border-radius:10px;padding:11px 16px;box-shadow:var(--shadow);font-size:13.5px;display:flex;gap:9px;align-items:center;animation:pop .2s ease;max-width:340px}
.toast.ok{background:#065f46}.toast.err{background:#b91c1c}.toast.warn{background:#b45309}

/* efficiency / mgmt */
.rank-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid #f0f3f8}
.rank-num{width:26px;height:26px;border-radius:50%;background:#eef1f6;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex:none}
.rank-row.top .rank-num{background:var(--amber);color:#fff}
.eff-bar{flex:1;height:8px;background:#eef1f6;border-radius:5px;overflow:hidden}
.eff-fill{height:100%;border-radius:5px}
.reco{display:flex;gap:10px;background:var(--amber-soft);border:1px solid #fbe4bd;border-radius:10px;padding:10px 13px;margin-bottom:9px;font-size:13px}
.reco.crit{background:var(--red-soft);border-color:#f6c8c8}
.reco.info{background:var(--blue-soft);border-color:#cfdffb}
.note{font-size:12px;color:var(--muted);background:#f7f9fc;border:1px dashed var(--line);border-radius:9px;padding:9px 12px;margin-top:10px}
.empty{text-align:center;color:var(--muted);padding:34px 10px}
.empty b{display:block;font-size:15px;color:var(--text);margin-bottom:4px}

/* bottom nav (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);z-index:50;justify-content:space-around;padding:5px 4px calc(6px + env(safe-area-inset-bottom))}
.bottom-nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--muted);padding:5px 9px;border-radius:9px;font-weight:600}
.bottom-nav button svg{width:20px;height:20px}
.bottom-nav button.active{color:var(--blue);background:var(--blue-soft)}

/* print */
#printArea{display:none}
@media print{
  body>#appShell,#toastWrap,.modal-overlay,#loginScreen{display:none!important}
  #printArea{display:block;padding:10px;font-size:12px}
  #printArea h1{font-size:20px}
  #printArea table{min-width:0;width:100%}
  #printArea th,#printArea td{padding:6px 8px;border:1px solid #ccc}
  #printArea .p-head{display:flex;justify-content:space-between;border-bottom:3px solid #0e1b33;padding-bottom:8px;margin-bottom:14px}
  #printArea .p-kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  #printArea .p-kpi{border:1px solid #ccc;border-radius:8px;padding:8px 14px}
  #printArea .p-kpi b{display:block;font-size:18px}
}

@media(max-width:1020px){.grid-2,.grid-3{grid-template-columns:1fr}}
@media(max-width:760px){
  .sidebar{display:none}
  .main{margin-left:0}
  .bottom-nav{display:flex}
  .content{padding:14px 12px 84px}
  .topbar{padding:9px 12px}
  .topbar h1{font-size:15.5px}
  .search-wrap{flex:1 1 auto}
  .topbar .me b,.topbar .me span{display:none}
  .form-grid{grid-template-columns:1fr}
  .grid-kpi{grid-template-columns:1fr 1fr}
  .notif-panel{left:10px;right:10px;width:auto}
  .kb-col{width:246px}
  .cal-day{min-height:56px;font-size:11px}
  table{min-width:640px}
}
</style>
</head>
<body>
<!-- ================= LOGIN ================= -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><div class="logo-mark">F<span>C</span></div>
      <div><h1>FlowCore</h1><div class="login-sub" style="margin:0">Task management sistem za Balkan Transport</div></div>
    </div>
    <p class="login-sub">Prijavite se na svoj nalog</p>
    <div id="loginError" class="login-error hidden"></div>
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="ime@balkantransport.rs" autocomplete="username"></div>
    <div class="field"><label>Lozinka</label><input type="password" id="loginPass" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')UI.submitLogin()"></div>
    <button class="btn btn-primary btn-block" id="loginBtn" onclick="UI.submitLogin()">Prijavi se</button>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="appShell" class="hidden">
  <aside class="sidebar">
    <div class="brand"><div class="logo-mark">F<span>C</span></div><div><b>FlowCore</b><small>Balkan Transport</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="side-footer">FlowCore v2.0<br>Online baza (Supabase)</div>
  </aside>
  <div class="main">
    <div class="topbar">
      <h1 id="topbarTitle">Dashboard</h1>
      <div class="spacer"></div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
        <input id="globalSearch" placeholder="Pretraga taskova..." oninput="UI.onGlobalSearch(this.value)">
      </div>
      <button class="icon-btn" onclick="UI.toggleNotifPanel()" title="Notifikacije" aria-label="Notifikacije">

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhrc3d4eGxpZm15ZnZ3a2duanBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODEzNjksImV4cCI6MjA5ODU1NzM2OX0.yNaPyrJno3TUakp4Da_qER04H4nV1gXNckAnFDKXURU"; // <-- ovde unesi Supabase anon key (produkcija)

/* ---------------- HELPERS ---------------- */
const $ = s => document.querySelector(s);

  : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==="x"?r:(r&3|8)).toString(16);});
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function pad(n){ return String(n).padStart(2,"0"); }
function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso); return pad(d.getDate())+"."+pad(d.getMonth()+1)+"."+d.getFullYear()+"."; }
function fmtDateTime(iso){ if(!iso) return "—"; const d=new Date(iso); return fmtDate(iso)+" "+pad(d.getHours())+":"+pad(d.getMinutes()); }
function dateInput(iso){ if(!iso) return ""; const d=new Date(iso); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }

function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString(); }
function inDays(n,h){ const d=new Date(); d.setDate(d.getDate()+n); d.setHours(h==null?17:h,0,0,0); return d.toISOString(); }
function hoursBetween(a,b){ return (new Date(b)-new Date(a))/36e5; }

/* ---------------- APP STATE ---------------- */
const AppState = {

/* =====================================================================
   STORAGE SERVICE — Supabase sloj perzistencije (v2.0).
   Čitanje: sve tabele odjednom -> AppState.db (isti oblik kao ranije,
   camelCase + nazivi odeljenja/kategorija umesto ID-jeva).
   Upis: ciljani upiti po entitetu (saveTask, saveNotification, saveAudit).
   Upisi su optimistični: UI se odmah osvežava, greška iz baze se
   prijavljuje toast porukom i u konzoli.
   ===================================================================== */
const StorageService = {
  deptById:{}, deptByName:{}, catById:{}, catByName:{},

  _err(where, error){
    console.error("[Supabase] "+where+":", error);
    const detail = error ? [error.message, error.details, error.hint, error.code ? "kod: "+error.code : ""]
      .filter(Boolean).join(" · ") : "";
    if(typeof UI!=="undefined" && UI.toast)
      UI.toast("Greška pri čuvanju u bazi ("+where+")"+(detail ? ": "+detail : ". Osveži stranicu i pokušaj ponovo."), "err", 9000);
  },

  /* Obezbedi da sva odeljenja/kategorije iz aplikacije postoje u bazi,
     pa učitaj mape id<->naziv (aplikacija interno radi sa nazivima). */
  async ensureLookups(){
    const u1 = await sb.from("departments").upsert(DEPARTMENTS.map(name=>({name})), {onConflict:"name", ignoreDuplicates:true});
    if(u1.error) console.warn("[Supabase] departments upsert:", u1.error);
    const u2 = await sb.from("categories").upsert(CATEGORIES.map(name=>({name})), {onConflict:"name", ignoreDuplicates:true});
    if(u2.error) console.warn("[Supabase] categories upsert:", u2.error);
    const [d,c] = await Promise.all([sb.from("departments").select("*"), sb.from("categories").select("*")]);
    if(d.error||c.error) throw (d.error||c.error);
    this.deptById={}; this.deptByName={}; this.catById={}; this.catByName={};
    d.data.forEach(x=>{ this.deptById[x.id]=x.name; this.deptByName[x.name]=x.id; });
    c.data.forEach(x=>{ this.catById[x.id]=x.name; this.catByName[x.name]=x.id; });
  },

  mapUser(r){
    return {id:r.id, name:r.name, email:r.email, role:r.role,
      department:this.deptById[r.department_id]||"", color:r.color||AVATAR_COLORS[0]};
  },

  mapTask(r){
    return {
      id:r.id, title:r.title, description:r.description||"",
      department:this.deptById[r.department_id]||"", category:this.catById[r.category_id]||"",
      status:r.status, priority:r.priority,
      createdBy:r.created_by, assignedTo:r.assigned_to,
      participants:(r.task_participants||[]).map(p=>p.user_id),
      createdAt:r.created_at, updatedAt:r.updated_at, dueDate:r.due_date,
      startedAt:r.started_at, firstResponseAt:r.first_response_at, completedAt:r.completed_at,
      estimatedMinutes:r.estimated_minutes, actualMinutes:r.actual_minutes,
      tags:r.tags||[], blockedReason:r.blocked_reason||"", waitingFor:r.waiting_for||"",
      isArchived:!!r.is_archived,
      comments:(r.task_comments||[]).map(c=>({id:c.id, userId:c.user_id, text:c.text, internal:!!c.internal, createdAt:c.created_at}))
        .sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt)),
      checklist:(r.task_checklist||[]).slice().sort((a,b)=>(a.position||0)-(b.position||0))
        .map(k=>({id:k.id, label:k.label, done:!!k.done, required:!!k.required})),
      attachments:(r.task_attachments||[]).map(a=>({id:a.id, name:a.name, addedBy:a.added_by, addedAt:a.added_at}))
    };
  },

  async read(){
    await this.ensureLookups();
    const [users, tasks, notifs, audit] = await Promise.all([
      sb.from("users").select("*").order("name"),
      sb.from("tasks").select("*, task_comments(*), task_checklist(*), task_attachments(*), task_participants(user_id)").order("created_at",{ascending:false}),
      sb.from("notifications").select("*").order("created_at",{ascending:false}).limit(300),
      sb.from("audit_logs").select("*").order("at",{ascending:false}).limit(500)
    ]);
    const bad = users.error||tasks.error||notifs.error||audit.error;
    if(bad) throw bad;
    return {
      users: users.data.map(u=>this.mapUser(u)),
      tasks: tasks.data.map(t=>this.mapTask(t)),
      notifications: notifs.data.map(n=>({id:n.id, userId:n.user_id, taskId:n.task_id, text:n.text, read:!!n.read, createdAt:n.created_at})),
      auditLogs: audit.data.map(a=>({id:a.id, at:a.at, userId:a.user_id, action:a.action, entity:a.entity||"", details:a.details||""})),
      meta:{version:2, backend:"supabase"}
    };
  },

  taskRow(t){
    return {
      id:t.id, title:t.title, description:t.description||"",
      department_id:this.deptByName[t.department]||null, category_id:this.catByName[t.category]||null,
      status:t.status, priority:t.priority,
      created_by:t.createdBy||null, assigned_to:t.assignedTo||null,
      created_at:t.createdAt, updated_at:t.updatedAt, due_date:t.dueDate,
      started_at:t.startedAt||null, first_response_at:t.firstResponseAt||null, completed_at:t.completedAt||null,
      estimated_minutes:t.estimatedMinutes||null, actual_minutes:t.actualMinutes||null,
      tags:t.tags||[], blocked_reason:t.blockedReason||"", waiting_for:t.waitingFor||"",
      is_archived:!!t.isArchived
    };
  },

  /* Snimanje jednog taska + njegove dece (učesnici, komentari, checklist,
     prilozi): deca se brišu pa upisuje trenutno stanje — ID-jevi se čuvaju. */
  async saveTaskAsync(t){
    const up = await sb.from("tasks").upsert(this.taskRow(t));
    if(up.error) throw up.error;
    const del = await Promise.all([
      sb.from("task_participants").delete().eq("task_id", t.id),
      sb.from("task_comments").delete().eq("task_id", t.id),
      sb.from("task_checklist").delete().eq("task_id", t.id),
      sb.from("task_attachments").delete().eq("task_id", t.id)
    ]);
    const de = del.find(x=>x.error); if(de) throw de.error;
    const ins = await Promise.all([
      (t.participants||[]).length ? sb.from("task_participants").insert(t.participants.map(u=>({task_id:t.id, user_id:u}))) : {error:null},
      (t.comments||[]).length ? sb.from("task_comments").insert(t.comments.map(c=>({id:c.id, task_id:t.id, user_id:c.userId, text:c.text, internal:!!c.internal, created_at:c.createdAt}))) : {error:null},
      (t.checklist||[]).length ? sb.from("task_checklist").insert(t.checklist.map((k,i)=>({id:k.id, task_id:t.id, label:k.label, done:!!k.done, required:!!k.required, position:i}))) : {error:null},
      (t.attachments||[]).length ? sb.from("task_attachments").insert(t.attachments.map(a=>({id:a.id, task_id:t.id, name:a.name, added_by:a.addedBy||null, added_at:a.addedAt||new Date().toISOString()}))) : {error:null}
    ]);
    const ie = ins.find(x=>x.error); if(ie) throw ie.error;
  },
  saveTask(t){ StorageService._enqueue(()=>StorageService.saveTaskAsync(t), "task"); },

  /* Serijalizovan red upisa: svaki upis čeka da prethodni završi.
     Time notifikacija/audit nikad ne stigne u bazu pre taska na koji
     se odnosi (FK 23503 trka). Greška jednog upisa ne blokira sledeće. */
  _writeQueue: Promise.resolve(),
  _enqueue(job, where, warnOnly){
    const run = StorageService._writeQueue.then(job).catch(e=>{
      if(warnOnly) console.warn("[Supabase] "+where+":", e);
      else StorageService._err(where, e);
    });
    StorageService._writeQueue = run;
    return run;
  },

  saveNotification(n){
    StorageService._enqueue(async()=>{
      const r = await sb.from("notifications").insert({id:n.id, user_id:n.userId, task_id:n.taskId||null, text:n.text, read:!!n.read, created_at:n.createdAt});
      if(r.error) throw r.error;
    }, "notifikacija");
  },
  markNotificationsRead(ids){
    if(!ids || !ids.length) return;
    StorageService._enqueue(async()=>{
      const r = await sb.from("notifications").update({read:true}).in("id", ids);
      if(r.error) throw r.error;
    }, "notifikacija");
  },
  saveAudit(a){
    StorageService._enqueue(async()=>{
      const r = await sb.from("audit_logs").insert({id:a.id, at:a.at, user_id:a.userId, action:a.action, entity:a.entity||"", details:a.details||""});
      if(r.error) throw r.error;
    }, "audit", true);
  }
};

/* =====================================================================
   DATA SERVICE — učitavanje podataka iz Supabase-a
   ===================================================================== */
const DataService = {
  async loadData(){
    AppState.db = await StorageService.read();
    return AppState.db;
  },
  /* Zadržano radi kompatibilnosti — svi upisi sada idu kroz
     StorageService.saveTask / saveNotification / saveAudit. */
  saveData(){}
};

/* =====================================================================
   AUTH SERVICE — prava prijava preko Supabase Auth-a.
   Lozinke žive isključivo u Supabase Auth-u, nikad u tabeli users.
   ===================================================================== */
const AuthService = {
  async loginUser(email, password){
    const { data, error } = await sb.auth.signInWithPassword({ email:String(email||"").trim(), password });
    if(error) return {ok:false, error:"Pogrešan email ili lozinka."};
    const prof = await sb.from("users").select("*").eq("id", data.user.id).single();
    if(prof.error || !prof.data){
      await sb.auth.signOut();
      return {ok:false, error:"Nalog postoji, ali profil nije unet u tabelu users. Javi administratoru."};
    }
    await StorageService.ensureLookups();
    AppState.currentUser = StorageService.mapUser(prof.data);
    return {ok:true, user:AppState.currentUser};
  },
  logoutUser(){
    if(AppState.currentUser && AppState.db) AuditService.log("Odjava","user:"+AppState.currentUser.id, AppState.currentUser.name+" se odjavio/la");
    AppState.currentUser = null;
    sb.auth.signOut();
  },
  async restoreSession(){
    const { data } = await sb.auth.getSession();
    if(!data || !data.session) return false;
    const prof = await sb.from("users").select("*").eq("id", data.session.user.id).single();
    if(prof.error || !prof.data){ await sb.auth.signOut(); return false; }
    await StorageService.ensureLookups();
    AppState.currentUser = StorageService.mapUser(prof.data);
    return true;
  }
};

/* =====================================================================
   PERMISSION SERVICE — role i dozvole
   ===================================================================== */
const PermissionService = {
  isFinancialTask(task){ return FIN_DEPTS.includes(task.department) || FIN_CATS.includes(task.category); },
  isInvolved(user, task){ return task.assignedTo===user.id || task.createdBy===user.id || (task.participants||[]).includes(user.id); },

  canUserAccessTask(user, task){
    if(!user || !task) return false;
    switch(user.role){
      case "superadmin": case "menadzment": return true;
      case "finansije": return task.department===user.department || PermissionService.isFinancialTask(task) || PermissionService.isInvolved(user,task);
      case "voznipark": return task.department===user.department || task.department==="Vozni park" || PermissionService.isInvolved(user,task);
      /* teamlead, dispecer i svi ostali: vide sve zadatke svog sektora + one u kojima učestvuju */
      case "teamlead": case "dispecer": default:
        return task.department===user.department || PermissionService.isInvolved(user,task);
    }
  },
  canUserEditTask(user, task){
    if(!user || !task) return false;
    if(user.role==="superadmin" || user.role==="menadzment") return true;
    if(user.role==="teamlead") return task.department===user.department || PermissionService.isInvolved(user,task);
    if(user.role==="finansije") return (PermissionService.isFinancialTask(task) && task.assignedTo===user.id) || PermissionService.isInvolved(user,task);
    return PermissionService.isInvolved(user,task); // dispečer i vozni park — samo svoje
  },
  canUserDeleteTask(user, task){ // brisanje = arhiviranje
    if(!user) return false;
    if(user.role==="superadmin") return true;
    if(user.role==="menadzment") return true;
    if(user.role==="teamlead" && task && task.department===user.department) return true;
    return false;
  },
  canUserCreateTask(user){ return !!user; },
  canUserViewReports(user){ return ["superadmin","menadzment","teamlead"].includes(user.role); },
  canUserViewEfficiency(user){ return ["superadmin","menadzment"].includes(user.role); },
  canUserViewAudit(user){ return ["superadmin","menadzment"].includes(user.role); },
  canUserViewUsers(user){ return ["superadmin","menadzment"].includes(user.role); },
  canUserViewSettings(user){ return user.role==="superadmin"; },
  assignableUsers(){
    /* Svi korisnici mogu da dodele task bilo kome. */
    return AppState.db.users;
  },
  visibleTasks(user, includeArchived){
    return AppState.db.tasks.filter(t => (includeArchived || !t.isArchived) && PermissionService.canUserAccessTask(user,t));
  }
};

/* =====================================================================
   TASK SERVICE — poslovna logika taskova
   ===================================================================== */
const TaskService = {
  getTask(id){ return AppState.db.tasks.find(t=>t.id===id); },
  userById(id){ return AppState.db.users.find(u=>u.id===id); },

  calculateTaskDelay(task){
    if(!task.dueDate) return {late:false, days:0};
    const end = ["Završeno","Otkazano","Arhivirano"].includes(task.status) ? (task.completedAt||task.updatedAt) : new Date().toISOString();
    const diff = startOfDay(end) - startOfDay(task.dueDate);
    const days = Math.round(diff/864e5);
    const isClosed = ["Završeno","Otkazano","Arhivirano"].includes(task.status);
    return {late: days>0 && (!isClosed || (task.status==="Završeno" && new Date(task.completedAt)>new Date(task.dueDate))), days:Math.max(days,0)};
  },

  validate(data, existing){
    const errors = [];
    if(!data.title || !data.title.trim()) errors.push("Naziv taska je obavezan.");
    if(!data.dueDate) errors.push("Rok je obavezan.");
    if(!data.priority) errors.push("Prioritet je obavezan.");
    if(data.status!=="Novo" && !data.assignedTo) errors.push("Odgovorna osoba je obavezna ako status nije „Novo“.");
    if(data.status==="Blokirano" && !(data.blockedReason||"").trim()) errors.push("Za status „Blokirano“ mora se uneti razlog blokade.");
    if(data.status==="Čeka odgovor" && !(data.waitingFor||"").trim()) errors.push("Za status „Čeka odgovor“ mora se uneti od koga se čeka odgovor.");
    const checklist = data.checklist || (existing && existing.checklist) || [];
    if(data.status==="Završeno" && checklist.some(c=>c.required && !c.done)) errors.push("Task ima nezavršene obavezne checklist stavke — ne može u status „Završeno“.");
    return errors;
  },

  applyStatusTimestamps(task, oldStatus, actorId){
    const now = new Date().toISOString();
    if(task.status==="U toku" && !task.startedAt) task.startedAt = now;
    if(!task.firstResponseAt && actorId===task.assignedTo && task.status!==oldStatus) task.firstResponseAt = now;
    if(task.status==="Završeno" && oldStatus!=="Završeno"){ task.completedAt = now; if(task.startedAt && !task.actualMinutes) task.actualMinutes = Math.max(1,Math.round((new Date(now)-new Date(task.startedAt))/6e4)); }
    if(task.status!=="Završeno") task.completedAt = null;
  },

  createTask(data){
    const user = AppState.currentUser;
    const errors = TaskService.validate(data);
    if(errors.length) return {ok:false, errors};
    const now = new Date().toISOString();
    const task = Object.assign({
      id:uid("t"), title:"", description:"", department:DEPARTMENTS[0], category:CATEGORIES[0],
      status:"Novo", priority:"Normalan", createdBy:user.id, assignedTo:null, participants:[],
      createdAt:now, updatedAt:now, dueDate:null, startedAt:null, firstResponseAt:null, completedAt:null,
      estimatedMinutes:null, actualMinutes:null, tags:[], checklist:[], comments:[], attachments:[],
      blockedReason:"", waitingFor:"", isArchived:false
    }, data);
    TaskService.applyStatusTimestamps(task, "Novo", user.id);
    AppState.db.tasks.unshift(task);
    StorageService.saveTask(task);
    AuditService.log("Kreiranje taska", task.id, task.title);
    if(task.assignedTo && task.assignedTo!==user.id) NotificationService.notify(task.assignedTo, "Dodeljen ti je task: "+task.title, task.id);
    if(task.priority==="Kritičan" && task.assignedTo) NotificationService.notify(task.assignedTo, "Kritičan task: "+task.title, task.id);
    return {ok:true, task};
  },

  updateTask(taskId, updates){
    const user = AppState.currentUser;
    const task = TaskService.getTask(taskId);
    if(!task) return {ok:false, errors:["Task ne postoji."]};
    if(!PermissionService.canUserEditTask(user, task)) return {ok:false, errors:["Nemate dozvolu za izmenu ovog taska."]};
    const merged = Object.assign({}, task, updates);
    const errors = TaskService.validate(merged, task);
    if(errors.length) return {ok:false, errors};
    const oldStatus = task.status, oldDue = task.dueDate, oldAssignee = task.assignedTo, oldPri = task.priority;
    Object.assign(task, updates, {updatedAt:new Date().toISOString()});
    TaskService.applyStatusTimestamps(task, oldStatus, user.id);
    StorageService.saveTask(task);
    AuditService.log("Izmena taska", task.id, task.title);
    if(oldStatus!==task.status) AuditService.log("Promena statusa", task.id, oldStatus+" → "+task.status);
    if(oldPri!==task.priority){ AuditService.log("Promena prioriteta", task.id, oldPri+" → "+task.priority);
      if(task.priority==="Kritičan" && task.assignedTo) NotificationService.notify(task.assignedTo,"Task je postao kritičan: "+task.title, task.id); }
    if(oldDue!==task.dueDate){ AuditService.log("Promena roka", task.id, fmtDate(oldDue)+" → "+fmtDate(task.dueDate));
      if(task.assignedTo && task.assignedTo!==user.id) NotificationService.notify(task.assignedTo,"Promenjen je rok taska: "+task.title+" ("+fmtDate(task.dueDate)+")", task.id); }
    if(oldAssignee!==task.assignedTo && task.assignedTo && task.assignedTo!==user.id) NotificationService.notify(task.assignedTo,"Dodeljen ti je task: "+task.title, task.id);
    if(task.status==="Završeno" && oldStatus!=="Završeno") AuditService.log("Završetak taska", task.id, task.title);
    if(task.status==="Blokirano" && oldStatus!=="Blokirano" && task.assignedTo) NotificationService.notify(task.assignedTo,"Task je blokiran: "+task.title, task.id);
    return {ok:true, task};
  },

  changeTaskStatus(taskId, status){
    const task = TaskService.getTask(taskId);
    if(!task) return {ok:false, errors:["Task ne postoji."]};
    const updates = {status};
    if(status==="Blokirano" && !task.blockedReason){
      const r = prompt("Razlog blokade (obavezno):");
      if(!r || !r.trim()) return {ok:false, errors:["Za status „Blokirano“ mora se uneti razlog blokade."]};
      updates.blockedReason = r.trim();
    }
    if(status==="Čeka odgovor" && !task.waitingFor){
      const w = prompt("Od koga se čeka odgovor (obavezno):");
      if(!w || !w.trim()) return {ok:false, errors:["Za status „Čeka odgovor“ mora se uneti od koga se čeka odgovor."]};
      updates.waitingFor = w.trim();
    }
    return TaskService.updateTask(taskId, updates);
  },

  archiveTask(taskId){
    const user = AppState.currentUser;
    const task = TaskService.getTask(taskId);
    if(!task) return {ok:false, errors:["Task ne postoji."]};
    if(!PermissionService.canUserDeleteTask(user, task)) return {ok:false, errors:["Nemate dozvolu za arhiviranje."]};
    task.isArchived = true; task.status = "Arhivirano"; task.updatedAt = new Date().toISOString();
    StorageService.saveTask(task);
    AuditService.log("Arhiviranje taska", task.id, task.title);
    return {ok:true};
  },

  addTaskComment(taskId, text, internal){
    const user = AppState.currentUser;
    const task = TaskService.getTask(taskId);
    if(!task || !text || !text.trim()) return {ok:false};
    const c = {id:uid("c"), userId:user.id, text:text.trim(), createdAt:new Date().toISOString(), internal:!!internal};
    task.comments.push(c);
    task.updatedAt = c.createdAt;
    if(!task.firstResponseAt && user.id===task.assignedTo) task.firstResponseAt = c.createdAt;
    // @pominjanja
    AppState.db.users.forEach(u=>{
      const first = u.name.split(" ")[0];
      if(u.id!==user.id && (text.includes("@"+u.name) || text.includes("@"+first)))
        NotificationService.notify(u.id, user.name+" te je pomenuo/la u komentaru: "+task.title, task.id);
    });
    StorageService.saveTask(task);
    AuditService.log("Komentar", task.id, text.slice(0,80));
    return {ok:true, comment:c};
  },

  toggleChecklistItem(taskId, itemId){
    const task = TaskService.getTask(taskId);
    if(!task) return {ok:false};
    const item = task.checklist.find(i=>i.id===itemId);
    if(!item) return {ok:false};
    item.done = !item.done;
    task.updatedAt = new Date().toISOString();
    StorageService.saveTask(task);
    return {ok:true, item};
  }
};

/* =====================================================================
   NOTIFICATION SERVICE
   ===================================================================== */
const NotificationService = {
  notify(userId, text, taskId){
    const n = {id:uid("n"), userId, text, taskId:taskId||null, read:false, createdAt:new Date().toISOString()};
    AppState.db.notifications.unshift(n);
    if(AppState.db.notifications.length>300) AppState.db.notifications.length = 300;
    StorageService.saveNotification(n);
    if(typeof UI!=="undefined" && UI.refreshNotifBadge) UI.refreshNotifBadge();
  },
  forUser(user){ return AppState.db.notifications.filter(n=>n.userId===user.id); },
  unreadCount(user){ return NotificationService.forUser(user).filter(n=>!n.read).length; },
  markRead(id){ const n = AppState.db.notifications.find(x=>x.id===id); if(n && !n.read){ n.read = true; StorageService.markNotificationsRead([id]); } },
  markAllRead(user){ const ids = NotificationService.forUser(user).filter(n=>!n.read).map(n=>n.id); NotificationService.forUser(user).forEach(n=>n.read=true); StorageService.markNotificationsRead(ids); },
  checkLateTasksFor(user){
    AppState.db.tasks.filter(t=>!t.isArchived && t.assignedTo===user.id && OPEN_STATUSES.includes(t.status) && TaskService.calculateTaskDelay(t).late)
      .forEach(t=>{
        const key = "Kasni task: "+t.title;
        const exists = AppState.db.notifications.some(n=>n.userId===user.id && n.taskId===t.id && n.text===key);
        if(!exists) NotificationService.notify(user.id, key, t.id);
      });
  }
};

/* =====================================================================
   REPORT SERVICE — metrika, izveštaji, export
   ===================================================================== */
const ReportService = {
  calculateDashboardMetrics(user){
    const tasks = PermissionService.visibleTasks(user);
    const open = tasks.filter(t=>OPEN_STATUSES.includes(t.status));
    const mine = open.filter(t=>t.assignedTo===user.id);
    const now = new Date();
    const doneThisMonth = tasks.filter(t=>t.status==="Završeno" && t.completedAt && new Date(t.completedAt).getMonth()===now.getMonth() && new Date(t.completedAt).getFullYear()===now.getFullYear());
    const late = open.filter(t=>TaskService.calculateTaskDelay(t).late);
    const critical = open.filter(t=>t.priority==="Kritičan");
    const unassigned = open.filter(t=>!t.assignedTo);
    const blocked = tasks.filter(t=>t.status==="Blokirano");
    const withResp = tasks.filter(t=>t.firstResponseAt);
    const avgResp = withResp.length ? withResp.reduce((s,t)=>s+hoursBetween(t.createdAt,t.firstResponseAt),0)/withResp.length : null;
    const done = tasks.filter(t=>t.status==="Završeno" && t.completedAt);
    const avgRes = done.length ? done.reduce((s,t)=>s+hoursBetween(t.createdAt,t.completedAt),0)/done.length : null;
    const doneWithDue = done.filter(t=>t.dueDate);
    const onTime = doneWithDue.filter(t=>new Date(t.completedAt)<=new Date(t.dueDate));
    return {
      totalOpen:open.length, myOpen:mine.length, doneThisMonth:doneThisMonth.length,
      late:late.length, critical:critical.length, unassigned:unassigned.length,
      avgFirstResponseH:avgResp, avgResolutionH:avgRes,
      onTimePct: doneWithDue.length? Math.round(onTime.length/doneWithDue.length*100) : null,
      blocked:blocked.length,
      byStatus: KANBAN_STATUSES.map(s=>({label:s, value:tasks.filter(t=>t.status===s).length})),
      byPriority: PRIORITIES.map(p=>({label:p, value:open.filter(t=>t.priority===p).length})),
      byDept: DEPARTMENTS.map(d=>({label:d, value:open.filter(t=>t.department===d).length})).filter(x=>x.value>0),
      doneByDay: ReportService.doneByDay(tasks,14),
      lateByUser: AppState.db.users.map(u=>({label:u.name.split(" ")[0], value:open.filter(t=>t.assignedTo===u.id && TaskService.calculateTaskDelay(t).late).length})).filter(x=>x.value>0),
      lateTasks:late, criticalTasks:critical, unassignedTasks:unassigned, blockedTasks:blocked
    };
  },
  doneByDay(tasks, days){
    const out = [];
    for(let i=days-1;i>=0;i--){
      const d = startOfDay(new Date(Date.now()-i*864e5));
      const cnt = tasks.filter(t=>t.completedAt && startOfDay(t.completedAt).getTime()===d.getTime()).length;
      out.push({label:pad(d.getDate())+"."+pad(d.getMonth()+1)+".", value:cnt});
    }
    return out;
  },

  calculateEmployeeMetrics(){
    return AppState.db.users.map(u=>{
      const tasks = AppState.db.tasks.filter(t=>!t.isArchived && t.assignedTo===u.id);
      const open = tasks.filter(t=>OPEN_STATUSES.includes(t.status));
      const done = tasks.filter(t=>t.status==="Završeno" && t.completedAt);
      const doneDue = done.filter(t=>t.dueDate);
      const onTime = doneDue.filter(t=>new Date(t.completedAt)<=new Date(t.dueDate));
      const late = open.filter(t=>TaskService.calculateTaskDelay(t).late);
      const critAll = tasks.filter(t=>t.priority==="Kritičan");
      const critDone = critAll.filter(t=>t.status==="Završeno");
      const withResp = tasks.filter(t=>t.firstResponseAt);
      const avgResp = withResp.length ? withResp.reduce((s,t)=>s+hoursBetween(t.createdAt,t.firstResponseAt),0)/withResp.length : null;
      const avgRes = done.length ? done.reduce((s,t)=>s+hoursBetween(t.createdAt,t.completedAt),0)/done.length : null;
      // Indeks efikasnosti: 40% rok, 25% prva reakcija, 20% vreme rešavanja, 15% kritični
      const onTimeScore = doneDue.length ? onTime.length/doneDue.length : 0.5;
      const respScore = avgResp==null ? 0.5 : Math.max(0, 1 - avgResp/24);
      const resScore  = avgRes ==null ? 0.5 : Math.max(0, 1 - avgRes/96);
      const critScore = critAll.length ? critDone.length/critAll.length : 1;
      const index = Math.round((onTimeScore*40 + respScore*25 + resScore*20 + critScore*15));
      return {user:u, total:tasks.length, open:open.length, done:done.length, onTime:onTime.length,
        late:late.length, critical:critAll.filter(t=>OPEN_STATUSES.includes(t.status)).length,
        avgFirstResponseH:avgResp, avgResolutionH:avgRes,
        onTimePct: doneDue.length? Math.round(onTime.length/doneDue.length*100) : null, index};
    }).sort((a,b)=>b.index-a.index);
  },

  managementData(){
    const tasks = AppState.db.tasks.filter(t=>!t.isArchived);
    const open = tasks.filter(t=>OPEN_STATUSES.includes(t.status));
    const late = open.filter(t=>TaskService.calculateTaskDelay(t).late);
    const critical = open.filter(t=>t.priority==="Kritičan").sort((a,b)=>new Date(a.dueDate||"2100")-new Date(b.dueDate||"2100"));
    const unassigned = open.filter(t=>!t.assignedTo);
    const blocked = open.filter(t=>t.status==="Blokirano");
    const blockedLong = blocked.filter(t=>hoursBetween(t.updatedAt, new Date().toISOString())>24 || TaskService.calculateTaskDelay(t).late);
    const waitingLong = open.filter(t=>t.status==="Čeka odgovor" && hoursBetween(t.updatedAt,new Date().toISOString())>24);
    const byUserOpen = AppState.db.users.map(u=>({user:u, open:open.filter(t=>t.assignedTo===u.id).length, late:late.filter(t=>t.assignedTo===u.id).length})).sort((a,b)=>b.open-a.open);
    const byDept = DEPARTMENTS.map(d=>({dept:d, open:open.filter(t=>t.department===d).length, late:late.filter(t=>t.department===d).length, crit:critical.filter(t=>t.department===d).length})).filter(x=>x.open>0).sort((a,b)=>b.open-a.open);
    const recos = [];
    byDept.forEach(d=>{ if(d.late>=2) recos.push({type:d.crit>0?"crit":"warn", text:d.dept+" ima "+d.late+" taskova u kašnjenju"+(d.crit?", od čega su "+d.crit+" kritični":"")+"."}); });
    byUserOpen.forEach(x=>{ if(x.open>=6) recos.push({type:"warn", text:x.user.name+" ima "+x.open+" otvorenih taskova, preporučuje se provera opterećenja."});
      if(x.late>=2) recos.push({type:"crit", text:x.user.name+" ima "+x.late+" taskova u kašnjenju."}); });
    if(unassigned.length) recos.push({type:"info", text:"Postoji "+unassigned.length+(unassigned.length===1?" task":" taska/taskova")+" bez odgovorne osobe."});
    if(blockedLong.length) recos.push({type:"crit", text:blockedLong.length+" task(ova) je blokirano duže od 24h."});
    if(waitingLong.length) recos.push({type:"warn", text:waitingLong.length+" task(ova) čeka odgovor duže od 24h."});
    if(!recos.length) recos.push({type:"info", text:"Nema kritičnih upozorenja — operativa je pod kontrolom."});
    return {critical, late, unassigned, blocked, blockedLong, waitingLong, byUserOpen, byDept, recos};
  },

  exportTasksCSV(tasks){
    const rows = [["ID","Naziv","Status","Prioritet","Odeljenje","Kategorija","Odgovorna osoba","Rok","Kreirano","Završeno","Kasni","Komentari"]];
    tasks.forEach(t=>{
      const a = TaskService.userById(t.assignedTo);
      const d = TaskService.calculateTaskDelay(t);
      rows.push([t.id,t.title,t.status,t.priority,t.department,t.category,a?a.name:"—",fmtDate(t.dueDate),fmtDate(t.createdAt),fmtDate(t.completedAt),d.late?"DA ("+d.days+" d)":"NE",String(t.comments.length)]);
    });
    const csv = "\uFEFF"+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(";")).join("\r\n");
    const blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download="flowcore_taskovi_"+dateInput(new Date().toISOString())+".csv";
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    AuditService.log("Export izveštaja","csv","CSV export ("+tasks.length+" taskova)");
    return csv;
  },

  printReport(type){
    const user = AppState.currentUser;
    const all = PermissionService.visibleTasks(user);
    const m = ReportService.calculateDashboardMetrics(user);
    const now = new Date();
    let title="", tasks=all, extra="";
    if(type==="dnevni"){ title="Dnevni operativni izveštaj";
      tasks = all.filter(t=>OPEN_STATUSES.includes(t.status) && (!t.dueDate || startOfDay(t.dueDate)<=startOfDay(now)));
    } else if(type==="nedeljni"){ title="Nedeljni izveštaj";
      tasks = all.filter(t=>new Date(t.updatedAt)>=new Date(Date.now()-7*864e5));
    } else if(type==="mesecni"){ title="Mesečni menadžment izveštaj";
      tasks = all.filter(t=>new Date(t.updatedAt)>=new Date(now.getFullYear(),now.getMonth(),1));
      extra = ReportService.printEmployeeBlock();
    } else if(type==="zaposleni"){ title="Izveštaj po zaposlenom"; extra = ReportService.printEmployeeBlock(); tasks = all.filter(t=>OPEN_STATUSES.includes(t.status));
    } else if(type==="odeljenje"){ title="Izveštaj po odeljenju";
      extra = "<h2>Opterećenje po odeljenjima</h2><table><tr><th>Odeljenje</th><th>Otvoreno</th><th>Kasni</th></tr>"+
        ReportService.managementData().byDept.map(d=>"<tr><td>"+esc(d.dept)+"</td><td>"+d.open+"</td><td>"+d.late+"</td></tr>").join("")+"</table>";
      tasks = all.filter(t=>OPEN_STATUSES.includes(t.status));
    }
    const kpi = (l,v)=>'<div class="p-kpi"><b>'+v+'</b>'+l+'</div>';
    const rowsHtml = tasks.slice(0,80).map(t=>{
      const a = TaskService.userById(t.assignedTo); const d = TaskService.calculateTaskDelay(t);
      return "<tr><td>"+esc(t.title)+"</td><td>"+esc(t.status)+"</td><td>"+esc(t.priority)+"</td><td>"+esc(t.department)+"</td><td>"+(a?esc(a.name):"—")+"</td><td>"+fmtDate(t.dueDate)+"</td><td>"+(d.late?"KASNI "+d.days+" d":"—")+"</td></tr>";
    }).join("");
    $("#printArea").innerHTML =
      '<div class="p-head"><div><h1>FlowCore — '+esc(title)+'</h1><div>Balkan Transport · Task management sistem</div></div>'+
      '<div style="text-align:right">Generisano: '+fmtDateTime(now.toISOString())+'<br>Korisnik: '+esc(user.name)+'</div></div>'+
      '<div class="p-kpis">'+kpi("Aktivni taskovi",m.totalOpen)+kpi("U kašnjenju",m.late)+kpi("Kritični",m.critical)+kpi("Blokirani",m.blocked)+kpi("Završeno ovog meseca",m.doneThisMonth)+kpi("% na vreme",(m.onTimePct==null?"—":m.onTimePct+"%"))+'</div>'+
      '<p><b>Sažetak:</b> Prosečno vreme prve reakcije: '+fmtHours(m.avgFirstResponseH)+' · Prosečno vreme rešavanja: '+fmtHours(m.avgResolutionH)+' · Taskovi bez odgovorne osobe: '+m.unassigned+'</p>'+extra+
      '<h2 style="margin:12px 0 6px">Taskovi ('+tasks.length+')</h2>'+
      '<table><tr><th>Naziv</th><th>Status</th><th>Prioritet</th><th>Odeljenje</th><th>Odgovoran</th><th>Rok</th><th>Kašnjenje</th></tr>'+rowsHtml+'</table>'+
      '<p style="margin-top:14px;color:#666;font-size:11px">FlowCore v1.0 · Interni dokument Balkan Transport-a.</p>';
    AuditService.log("Export izveštaja","print",title);
    window.print();
  },
  printEmployeeBlock(){
    const em = ReportService.calculateEmployeeMetrics();
    return "<h2>Efikasnost zaposlenih</h2><table><tr><th>Zaposleni</th><th>Otvoreno</th><th>Završeno</th><th>U roku %</th><th>Kasni</th><th>Indeks</th></tr>"+
      em.map(e=>"<tr><td>"+esc(e.user.name)+"</td><td>"+e.open+"</td><td>"+e.done+"</td><td>"+(e.onTimePct==null?"—":e.onTimePct+"%")+"</td><td>"+e.late+"</td><td>"+e.index+"</td></tr>").join("")+"</table>";
  }
};

const UI = {
  /* ---------- toast & modal ---------- */
  toast(msg, type, durationMs){
    const el = document.createElement("div");
    el.className = "toast "+(type||"");
    el.textContent = msg;
    $("#toastWrap").appendChild(el);
    setTimeout(()=>{ el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(()=>el.remove(),320); }, durationMs||3200);
  },
  modal(html){ $("#modalWrap").innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)UI.closeModal()"><div class="modal">'+html+'</div></div>'; },
  closeModal(){ $("#modalWrap").innerHTML=""; },
  confirm(text, onYes){
    UI.modal('<header><h2>Potvrda</h2><button class="btn btn-sm" onclick="UI.closeModal()">✕</button></header>'+
      '<div class="modal-body"><p>'+esc(text)+'</p></div>'+

  /* ---------- login ---------- */
  renderLogin(){
    $("#loginScreen").classList.remove("hidden");
    $("#appShell").classList.add("hidden");
  },
  async submitLogin(){
    const btn = $("#loginBtn"), errEl = $("#loginError");
    errEl.classList.add("hidden");
    btn.disabled = true; btn.textContent = "Prijavljivanje...";
    try{
      const r = await AuthService.loginUser($("#loginEmail").value, $("#loginPass").value);
      if(!r.ok){ errEl.textContent = r.error; errEl.classList.remove("hidden"); return; }
      btn.textContent = "Učitavanje podataka...";
      await DataService.loadData();
      $("#loginPass").value = "";
      AuditService.log("Prijava", "user:"+r.user.id, r.user.name+" se prijavio/la");
      NotificationService.checkLateTasksFor(r.user);
      UI.enterApp();
    }catch(e){
      console.error(e);
      errEl.textContent = "Greška pri povezivanju sa bazom. Proveri internet konekciju.";
      errEl.classList.remove("hidden");
    }finally{
      btn.disabled = false; btn.textContent = "Prijavi se";
    }
  },
  logout(){ AuthService.logoutUser(); UI.closeModal(); UI.renderLogin(); },

  enterApp(){
    $("#loginScreen").classList.add("hidden");
    $("#appShell").classList.remove("hidden");
    const u = AppState.currentUser;
    $("#meName").textContent = u.name;
    $("#meRole").textContent = ROLES[u.role].label;
    const av = $("#meAvatar"); av.textContent = initials(u.name); av.style.background = u.color;
    UI.renderNav();
    UI.refreshNotifBadge();
    UI.go("dashboard");
    UI.toast("Dobrodošli, "+u.name.split(" ")[0]+"!", "ok");
  },

  /* ---------- navigacija ---------- */
  visiblePages(){ return PAGES.filter(p=>p.show(AppState.currentUser)); },
  renderNav(){
    const pages = UI.visiblePages();
    let html = "", group = "";
    pages.forEach(p=>{
      if(p.group!==group){ group = p.group; html += '<div class="nav-group">'+group+'</div>'; }
      html += '<button class="nav-item" data-page="'+p.id+'" onclick="UI.go(\''+p.id+'\')">'+ICONS[p.icon]+esc(p.title)+'</button>';
    });
    $("#sidebarNav").innerHTML = html;
    const bottom = ["dashboard","mytasks","kanban","calendar"].filter(id=>pages.some(p=>p.id===id));
    $("#bottomNav").innerHTML = bottom.map(id=>{
      const p = PAGES.find(x=>x.id===id);
      return '<button data-page="'+id+'" onclick="UI.go(\''+id+'\')">'+ICONS[p.icon]+p.title.split(" ")[0]+'</button>';
    }).join("") + '<button onclick="UI.openTaskForm()" style="color:var(--blue)">'+ICONS.plus+'Novi</button>';
  },

  go(page){
    if(!UI.visiblePages().some(p=>p.id===page)) page = "dashboard";
    AppState.page = page;
    AppState.charts.forEach(c=>{ try{c.destroy();}catch(e){} }); AppState.charts = [];
    document.querySelectorAll(".nav-item,.bottom-nav button").forEach(b=>b.classList.toggle("active", b.dataset.page===page));
    $("#topbarTitle").textContent = (PAGES.find(p=>p.id===page)||{}).title || "";
    $("#notifPanel").classList.add("hidden");
    const R = {dashboard:UI.renderDashboard, mytasks:UI.renderMyTasks, alltasks:UI.renderTaskListPage,
      kanban:UI.renderKanban, calendar:UI.renderCalendar, reports:UI.renderReports,
      efficiency:UI.renderEmployeeEfficiency, management:UI.renderManagementView,
      users:UI.renderUsers, audit:UI.renderAudit, settings:UI.renderSettings, profile:UI.renderProfile};
    (R[page]||UI.renderDashboard)();

    AppState.filters.q = v;
    if(!["alltasks","mytasks"].includes(AppState.page)) UI.go("alltasks"); else UI.go(AppState.page);
  },

  /* ---------- charts (Chart.js + CSS fallback) ---------- */
  chart(canvasId, type, data, opts){
    const el = document.getElementById(canvasId);
    if(!el) return;
    if(typeof Chart === "undefined"){ // fallback: CSS barovi
      const wrap = el.parentElement;
      const max = Math.max(1, ...data.map(d=>d.value));
      wrap.innerHTML = data.map((d,i)=>'<div class="css-bar-row"><span class="lbl">'+esc(d.label)+'</span><span class="css-bar-track"><span class="css-bar-fill" style="width:'+Math.round(d.value/max*100)+'%;background:'+((opts&&opts.colors&&opts.colors[i%opts.colors.length])||"var(--blue)")+'"></span></span><span class="val">'+d.value+'</span></div>').join("") || '<div class="empty">Nema podataka</div>';
      wrap.style.height = "auto";
      return;
    }
    const palette = (opts&&opts.colors)||["#2563eb","#7c3aed","#10b981","#f59e0b","#ef4444","#0e1b33","#0369a1","#9d174d"];
    const cfg = {
      type, data:{ labels:data.map(d=>d.label),
        datasets:[{ label:(opts&&opts.label)||"", data:data.map(d=>d.value),
          backgroundColor: type==="line" ? "rgba(37,99,235,.12)" : palette,
          borderColor: type==="line" ? "#2563eb" : palette, borderWidth: type==="line"?2:0,
          fill:type==="line", tension:.3, borderRadius:6 }]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display: type==="doughnut", position:"bottom", labels:{boxWidth:12,font:{size:11}} } },
        scales: type==="doughnut" ? {} : { y:{ beginAtZero:true, ticks:{precision:0} }, x:{ grid:{display:false} } } }
    };
    AppState.charts.push(new Chart(el, cfg));
  },

  /* ---------- LISTA TASKOVA ---------- */
  renderMyTasks(){ UI.renderTaskListPage(true); },
  renderTaskListPage(onlyMine){
    const u = AppState.currentUser;
    const f = AppState.filters;
    if(onlyMine===true) f.quick = "moji";
    let tasks = PermissionService.visibleTasks(u, f.status==="Arhivirano");
    if(f.q) { const q=f.q.toLowerCase(); tasks = tasks.filter(t=>(t.title+" "+t.description+" "+t.tags.join(" ")).toLowerCase().includes(q)); }
    if(f.status) tasks = tasks.filter(t=>t.status===f.status);
    if(f.priority) tasks = tasks.filter(t=>t.priority===f.priority);
    if(f.department) tasks = tasks.filter(t=>t.department===f.department);
    if(f.assignedTo) tasks = tasks.filter(t=>t.assignedTo===f.assignedTo);
    if(f.category) tasks = tasks.filter(t=>t.category===f.category);
    if(f.quick==="moji") tasks = tasks.filter(t=>t.assignedTo===u.id || (t.participants||[]).includes(u.id));
    if(f.quick==="kasni") tasks = tasks.filter(t=>OPEN_STATUSES.includes(t.status) && TaskService.calculateTaskDelay(t).late);
    if(f.quick==="danas") tasks = tasks.filter(t=>t.dueDate && startOfDay(t.dueDate).getTime()===startOfDay(new Date()).getTime());
    if(f.quick==="nedelja") tasks = tasks.filter(t=>{ if(!t.dueDate) return false; const d=startOfDay(t.dueDate), n=startOfDay(new Date()); return d>=n && d<=new Date(n.getTime()+6*864e5); });
    tasks = tasks.slice().sort((a,b)=>{
      let va, vb;
      if(f.sortBy==="dueDate"){ va=a.dueDate||"2100"; vb=b.dueDate||"2100"; }
      else if(f.sortBy==="priority"){ va=PRIORITIES.indexOf(b.priority); vb=PRIORITIES.indexOf(a.priority); }
      else { va=a[f.sortBy]||""; vb=b[f.sortBy]||""; }
      return (va<vb?-1:va>vb?1:0)*f.sortDir;
    });
    UI._lastFiltered = tasks;
    const opt = (arr,cur,all)=>'<option value="">'+all+'</option>'+arr.map(x=>'<option '+(cur===x?"selected":"")+'>'+x+'</option>').join("");
    const chip = (id,label)=>'<button class="chip '+(f.quick===id?"active":"")+'" onclick="UI.setQuick(\''+id+'\')">'+label+'</button>';
    const rows = tasks.map(t=>{
      const a = TaskService.userById(t.assignedTo), d = TaskService.calculateTaskDelay(t);
      const canEdit = PermissionService.canUserEditTask(u,t), canDel = PermissionService.canUserDeleteTask(u,t);
      const statusSel = canEdit ? '<select onchange="UI.quickStatus(\''+t.id+'\',this.value)" onclick="event.stopPropagation()">'+STATUSES.filter(s=>s!=="Arhivirano").map(s=>'<option '+(t.status===s?"selected":"")+'>'+s+'</option>').join("")+'</select>' : UI.statusBadge(t.status);
      return '<tr><td class="small muted">'+t.id+'</td>'+
        '<td><span class="t-title" onclick="UI.openTask(\''+t.id+'\')">'+esc(t.title)+'</span>'+(t.comments.length?' <span class="small muted">💬'+t.comments.length+'</span>':"")+'</td>'+
        '<td>'+statusSel+'</td><td>'+UI.priBadge(t.priority)+'</td>'+
        '<td><span class="badge b-dept">'+esc(t.department)+'</span></td>'+
        '<td>'+(a?'<span style="display:inline-flex;align-items:center;gap:6px">'+avatarHtml(a,22)+esc(a.name.split(" ")[0])+'</span>':'<span class="muted">—</span>')+'</td>'+
        '<td>'+fmtDate(t.dueDate)+'</td>'+
        '<td>'+(d.late?'<span class="badge b-late">+'+d.days+' d</span>':'<span class="badge b-ok">u roku</span>')+'</td>'+
        '<td><div class="row-actions">'+
          '<button class="btn btn-sm" onclick="UI.openTask(\''+t.id+'\')">Otvori</button>'+
          (canEdit?'<button class="btn btn-sm" onclick="UI.openTaskForm(\''+t.id+'\')">Izmeni</button>':"")+
          (canDel?'<button class="btn btn-sm" style="color:var(--red)" onclick="UI.askArchive(\''+t.id+'\')">Arhiviraj</button>':"")+
        '</div></td></tr>';
    }).join("");
    $("#pageContent").innerHTML =
      '<div class="page-actions">'+
        '<button class="btn btn-primary" onclick="UI.openTaskForm()">'+ICONS.plus+' Novi task</button>'+
        '<button class="btn" onclick="ReportService.exportTasksCSV(UI._lastFiltered);UI.toast(\'CSV izvezen.\',\'ok\')">Export CSV</button>'+
        '<button class="btn" onclick="ReportService.printReport(\'dnevni\')">Export PDF</button>'+
        '<button class="btn btn-ghost" onclick="UI.resetFilters()">Resetuj filtere</button>'+
      '</div>'+
      '<div class="filters">'+
        '<input placeholder="Pretraga..." value="'+esc(f.q)+'" oninput="AppState.filters.q=this.value;UI.debounceList()">'+
        '<select onchange="AppState.filters.status=this.value;UI.go(AppState.page)">'+opt(STATUSES,f.status,"Svi statusi")+'</select>'+
        '<select onchange="AppState.filters.priority=this.value;UI.go(AppState.page)">'+opt(PRIORITIES,f.priority,"Svi prioriteti")+'</select>'+
        '<select onchange="AppState.filters.department=this.value;UI.go(AppState.page)">'+opt(DEPARTMENTS,f.department,"Sva odeljenja")+'</select>'+
        '<select onchange="AppState.filters.category=this.value;UI.go(AppState.page)">'+opt(CATEGORIES,f.category,"Sve kategorije")+'</select>'+
        '<select onchange="AppState.filters.assignedTo=this.value;UI.go(AppState.page)"><option value="">Svi korisnici</option>'+AppState.db.users.map(x=>'<option value="'+x.id+'" '+(f.assignedTo===x.id?"selected":"")+'>'+esc(x.name)+'</option>').join("")+'</select>'+
      '</div>'+
      '<div class="filters">'+chip("","Sve")+chip("moji","Moji taskovi")+chip("kasni","Kasni")+chip("danas","Rok danas")+chip("nedelja","Rok ove nedelje")+'</div>'+
      (tasks.length ? '<div class="table-wrap"><table><thead><tr>'+
        '<th>ID</th><th style="cursor:pointer" onclick="UI.sortBy(\'title\')">Naziv ⇅</th><th>Status</th>'+
        '<th style="cursor:pointer" onclick="UI.sortBy(\'priority\')">Prioritet ⇅</th><th>Odeljenje</th><th>Odgovoran</th>'+
        '<th style="cursor:pointer" onclick="UI.sortBy(\'dueDate\')">Rok ⇅</th><th>Kašnjenje</th><th>Akcije</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
        : '<div class="card"><div class="empty"><b>Nema taskova za izabrane filtere</b>Promenite filtere ili kreirajte novi task.</div></div>');
  },
  debounceList(){ clearTimeout(UI._deb); UI._deb = setTimeout(()=>UI.go(AppState.page), 320); },
  setQuick(id){ AppState.filters.quick = (AppState.filters.quick===id && id!=="")?"":id; if(AppState.page==="mytasks"&&id!=="moji") AppState.page="alltasks"; UI.go(AppState.page); },
  sortBy(k){ const f=AppState.filters; if(f.sortBy===k) f.sortDir*=-1; else {f.sortBy=k; f.sortDir=1;} UI.go(AppState.page); },
  resetFilters(){ AppState.filters = {q:"",status:"",priority:"",department:"",assignedTo:"",category:"",quick:"",sortBy:"dueDate",sortDir:1}; $("#globalSearch").value=""; UI.go(AppState.page); },
  quickStatus(taskId, status){
    const r = TaskService.changeTaskStatus(taskId, status);
    if(!r.ok){ UI.toast(r.errors[0], "err"); }
    else UI.toast("Status promenjen u „"+status+"“.", "ok");

  askArchive(taskId){

  renderKanban(){

    const cols = KANBAN_STATUSES.map(s=>{
      const list = tasks.filter(t=>t.status===s);

  /* ---------- KALENDAR ---------- */
  renderCalendar(){
    if(!AppState.calMonth) AppState.calMonth = startOfDay(new Date());
    const u = AppState.currentUser;
    const tasks = PermissionService.visibleTasks(u).filter(t=>t.dueDate);
    const cur = AppState.calMonth, y = cur.getFullYear(), mo = cur.getMonth();
    const monthNames = ["Januar","Februar","Mart","April","Maj","Jun","Jul","Avgust","Septembar","Oktobar","Novembar","Decembar"];
    const first = new Date(y,mo,1);
    let startDow = (first.getDay()+6)%7; // ponedeljak = 0
    const daysIn = new Date(y,mo+1,0).getDate();
    const todayT = startOfDay(new Date()).getTime();
    let cells = "";
    for(let i=0;i<startDow;i++){ const d = new Date(y,mo,i-startDow+1); cells += '<div class="cal-day other"><span class="d-num">'+d.getDate()+'</span></div>'; }
    for(let d=1;d<=daysIn;d++){
      const dt = new Date(y,mo,d);
      const dayTasks = tasks.filter(t=>startOfDay(t.dueDate).getTime()===dt.getTime());
      const late = dayTasks.some(t=>OPEN_STATUSES.includes(t.status) && TaskService.calculateTaskDelay(t).late);
      const sel = AppState.calSelected && startOfDay(AppState.calSelected).getTime()===dt.getTime();
      cells += '<div class="cal-day'+(dt.getTime()===todayT?" today":"")+(sel?" selected":"")+'" onclick="UI.calSelect('+dt.getTime()+')">'+
        '<span class="d-num">'+d+'</span>'+(dayTasks.length?'<br><span class="cal-pill'+(late?" late":"")+'">'+dayTasks.length+' task'+(dayTasks.length>1?"a":"")+'</span>':"")+'</div>';
    }
    const selTasks = AppState.calSelected ? tasks.filter(t=>startOfDay(t.dueDate).getTime()===startOfDay(AppState.calSelected).getTime()) : [];
    $("#pageContent").innerHTML =
      '<div class="card"><div class="cal-head"><button class="btn btn-sm" onclick="UI.calMove(-1)">‹</button>'+
      '<h3 style="margin:0">'+monthNames[mo]+' '+y+'.</h3><button class="btn btn-sm" onclick="UI.calMove(1)">›</button>'+
      '<button class="btn btn-sm btn-ghost" onclick="AppState.calMonth=startOfDay(new Date());AppState.calSelected=null;UI.go(\'calendar\')">Danas</button></div>'+
      '<div class="cal-grid">'+["Pon","Uto","Sre","Čet","Pet","Sub","Ned"].map(d=>'<div class="cal-dow">'+d+'</div>').join("")+cells+'</div></div>'+
      (AppState.calSelected?'<div class="card"><h3>Taskovi za '+fmtDate(new Date(AppState.calSelected).toISOString())+'</h3>'+UI.miniTaskList(selTasks)+'</div>':'<div class="note">Kliknite na dan da vidite taskove sa tim rokom.</div>');
  },
  calMove(n){ const c=AppState.calMonth; AppState.calMonth = new Date(c.getFullYear(), c.getMonth()+n, 1); AppState.calSelected=null; UI.go("calendar"); },
  calSelect(ts){ AppState.calSelected = new Date(ts); UI.go("calendar"); },

  /* Opcije za "Odgovorna osoba": svi korisnici izabranog sektora.
     Ako sektor nema nijednog korisnika, prikazuju se svi. */

    let list = AppState.db.users.filter(x=>x.department===dept);
    if(!list.length) list = AppState.db.users;
    return '<option value="">— bez odgovorne osobe —</option>'+
      list.map(x=>'<option value="'+x.id+'" '+(selectedId===x.id?"selected":"")+'>'+esc(x.name)+'</option>').join("");

  formDeptChanged(){
    const dept = $("#fDept").value;
    const sel = $("#fAssignee");
    const cur = sel.value;
    sel.innerHTML = UI.formAssigneeOptions(dept, cur);
    /* ako prethodno izabrana osoba nije u novom sektoru, vraća se na "bez odgovorne osobe" */
    if(sel.value!==cur) sel.value = "";
  },
  formStatusHint(){
    const s = $("#fStatus").value;
    $("#fBlockedWrap").style.display = s==="Blokirano"?"block":"none";
    $("#fWaitingWrap").style.display = s==="Čeka odgovor"?"block":"none";

  formRenderCheck(){
    $("#fChecklist").innerHTML = UI._formChecklist.map((c,i)=>
      '<div class="check-row'+(c.done?" done":"")+'"><input type="checkbox" '+(c.done?"checked":"")+' onchange="UI._formChecklist['+i+'].done=this.checked;UI.formRenderCheck()">'+
      '<label style="flex:1">'+esc(c.label)+'</label>'+(c.required?'<span class="req">OBAVEZNA</span>':"")+
      '<button class="btn btn-sm" onclick="UI._formChecklist.splice('+i+',1);UI.formRenderCheck()">✕</button></div>').join("") || '<div class="small muted">Nema stavki.</div>';

  formAddAtt(){
    const v = $("#fAttNew").value.trim(); if(!v) return;
    UI._formAttachments.push({id:uid("f"), name:v, addedAt:new Date().toISOString(), addedBy:AppState.currentUser.id});
    $("#fAttNew").value=""; UI.formRenderAtts();

  saveTaskForm(taskId){
    const data = {
      title:$("#fTitle").value.trim(), description:$("#fDesc").value.trim(),
      department:$("#fDept").value, category:$("#fCat").value,
      status:$("#fStatus").value, priority:$("#fPri").value,
      assignedTo:$("#fAssignee").value||null,
      participants:[...$("#fParts").selectedOptions].map(o=>o.value),
      dueDate:$("#fDue").value?new Date($("#fDue").value+"T17:00:00").toISOString():null,
      estimatedMinutes:$("#fEst").value?parseInt($("#fEst").value,10):null,
      tags:$("#fTags").value.split(",").map(s=>s.trim()).filter(Boolean),
      blockedReason:$("#fBlocked").value.trim(), waitingFor:$("#fWaiting").value.trim(),
      checklist:UI._formChecklist, attachments:UI._formAttachments
    };
    const r = taskId ? TaskService.updateTask(taskId, data) : TaskService.createTask(data);
    if(!r.ok){ $("#formErrors").innerHTML = r.errors.map(e=>'<div class="login-error">'+esc(e)+'</div>').join(""); return; }
    UI.closeModal();
    UI.toast(taskId?"Izmene sačuvane.":"Task kreiran.","ok");
    UI.go(AppState.page);
  },

  /* ---------- DETALJ TASKA ---------- */
  openTask(taskId){
    const u = AppState.currentUser;
    const t = TaskService.getTask(taskId);
    if(!t){ UI.toast("Task ne postoji.","err"); return; }
    if(!PermissionService.canUserAccessTask(u,t)){ UI.toast("Nemate pristup ovom tasku.","err"); return; }
    const a = TaskService.userById(t.assignedTo), cb = TaskService.userById(t.createdBy);
    const d = TaskService.calculateTaskDelay(t);
    const canEdit = PermissionService.canUserEditTask(u,t), canDel = PermissionService.canUserDeleteTask(u,t);
    const dg = (l,v)=>'<div class="dg-item"><span>'+l+'</span>'+v+'</div>';
    const commentsHtml = t.comments.length ? t.comments.map(c=>{
      const cu = TaskService.userById(c.userId);
      const txt = esc(c.text).replace(/@([A-Za-zŠĐČĆŽšđčćž]+)/g,'<span class="mention">@$1</span>');
      return '<div class="comment"><div class="c-head"><b>'+(cu?esc(cu.name):"?")+(c.internal?' <span class="badge b-dept">interno</span>':"")+'</b><span class="muted">'+fmtDateTime(c.createdAt)+'</span></div>'+txt+'</div>';
    }).join("") : '<div class="small muted">Nema komentara.</div>';
    const checkHtml = t.checklist.length ? t.checklist.map(c=>
      '<div class="check-row'+(c.done?" done":"")+'"><input type="checkbox" '+(c.done?"checked":"")+' '+(canEdit?'onchange="UI.toggleCheck(\''+t.id+'\',\''+c.id+'\')"':"disabled")+'><label style="flex:1">'+esc(c.label)+'</label>'+(c.required?'<span class="req">OBAVEZNA</span>':"")+'</div>').join("") : '<div class="small muted">Nema checklist stavki.</div>';
    UI.modal(
      '<header><h2 style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+esc(t.title)+' '+UI.statusBadge(t.status)+UI.priBadge(t.priority)+'</h2>'+
      '<button class="btn btn-sm" onclick="UI.closeModal()">✕</button></header>'+
      '<div class="modal-body">'+
      (d.late?'<div class="login-error">Task kasni '+d.days+' dan(a). Rok je bio '+fmtDate(t.dueDate)+'.</div>':"")+
      (t.description?'<p style="margin-bottom:13px">'+esc(t.description)+'</p>':"")+
      '<div class="detail-grid">'+
        dg("Odeljenje",esc(t.department))+dg("Kategorija",esc(t.category))+
        dg("Odgovorna osoba",a?esc(a.name):"—")+dg("Kreirao",cb?esc(cb.name):"—")+
        dg("Rok",fmtDate(t.dueDate))+dg("Kreirano",fmtDateTime(t.createdAt))+
        dg("Početak rada",fmtDateTime(t.startedAt))+dg("Prva reakcija",fmtDateTime(t.firstResponseAt))+
        dg("Završeno",fmtDateTime(t.completedAt))+dg("Procena / utrošeno",(t.estimatedMinutes||"—")+" / "+(t.actualMinutes||"—")+" min")+
        (t.participants.length?dg("Učesnici",t.participants.map(id=>{const x=TaskService.userById(id);return x?esc(x.name):""}).join(", ")):"")+
        (t.tags.length?dg("Tagovi",t.tags.map(x=>'<span class="tag">'+esc(x)+'</span>').join(" ")):"")+
        (t.blockedReason?dg("Razlog blokade",'<span style="color:var(--red)">'+esc(t.blockedReason)+'</span>'):"")+
        (t.waitingFor?dg("Čeka odgovor od",esc(t.waitingFor)):"")+
        (t.attachments.length?dg("Prilozi",t.attachments.map(x=>"📎 "+esc(x.name)).join("<br>")):"")+
      '</div>'+
      (canEdit?'<div class="field"><label>Promena statusa</label><select onchange="UI.detailStatus(\''+t.id+'\',this.value)">'+
        STATUSES.filter(s=>s!=="Arhivirano").map(s=>'<option '+(t.status===s?"selected":"")+'>'+s+'</option>').join("")+'</select></div>':"")+
      '<h3 style="margin:13px 0 7px">Checklist</h3>'+checkHtml+
      '<h3 style="margin:15px 0 7px">Komentari ('+t.comments.length+')</h3>'+commentsHtml+
      '<div style="display:flex;gap:8px;margin-top:9px"><input id="newComment" placeholder="Dodaj komentar... (@Ime za pominjanje)" style="flex:1;border:1px solid var(--line);border-radius:8px;padding:9px 12px" onkeydown="if(event.key===\'Enter\')UI.sendComment(\''+t.id+'\')">'+
      '<button class="btn btn-primary" onclick="UI.sendComment(\''+t.id+'\')">Pošalji</button></div>'+
      '</div>'+
      '<footer>'+(canDel?'<button class="btn" style="color:var(--red);margin-right:auto" onclick="UI.closeModal();UI.askArchive(\''+t.id+'\')">Arhiviraj</button>':"")+
      (canEdit?'<button class="btn btn-primary" onclick="UI.openTaskForm(\''+t.id+'\')">Izmeni task</button>':"")+
      '<button class="btn" onclick="UI.closeModal()">Zatvori</button></footer>');
  },
  detailStatus(taskId, status){
    const r = TaskService.changeTaskStatus(taskId, status);
    if(!r.ok) UI.toast(r.errors[0],"err"); else UI.toast("Status promenjen.","ok");
    UI.openTask(taskId);

  sendComment(taskId){

    const r = TaskService.addTaskComment(taskId, v);
    if(r.ok){ UI.toast("Komentar dodat.","ok"); UI.openTask(taskId); }

      em.map((e,i)=>'<div class="rank-row'+(i===0?" top":"")+'"><span class="rank-num">'+(i+1)+'</span>'+avatarHtml(e.user,28)+
