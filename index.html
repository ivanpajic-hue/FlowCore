  backupJson(){
    const blob = new Blob([JSON.stringify(AppState.db,null,2)],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download="flowcore_backup_"+dateInput(new Date().toISOString())+".json";
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    UI.toast("Backup preuzet.","ok");
  },

  /* ---------- PROMENA LOZINKE (Supabase Auth) ---------- */
  openPasswordForm(){
    UI.modal('<header><h2>Promena lozinke</h2><button class="btn btn-sm" onclick="UI.closeModal()">✕</button></header>'+
      '<div class="modal-body"><div id="formErrors"></div>'+
      '<div class="field"><label>Nova lozinka * (najmanje 6 znakova)</label><input type="password" id="pwNew" autocomplete="new-password"></div>'+
      '<div class="field"><label>Ponovi novu lozinku *</label><input type="password" id="pwNew2" autocomplete="new-password" onkeydown="if(event.key===\'Enter\')UI.submitPasswordChange()"></div>'+
      '<p class="small muted">Lozinka se menja u Supabase Auth-u i važi odmah, na svim uređajima.</p></div>'+
      '<footer><button class="btn" onclick="UI.closeModal()">Otkaži</button><button class="btn btn-primary" id="pwBtn" onclick="UI.submitPasswordChange()">Sačuvaj lozinku</button></footer>');
  },
  async submitPasswordChange(){
    const p1 = $("#pwNew").value, p2 = $("#pwNew2").value, errs = [];
    if(!p1 || p1.length < 6) errs.push("Lozinka mora imati najmanje 6 znakova.");
    if(p1 !== p2) errs.push("Lozinke se ne poklapaju.");
    if(errs.length){ $("#formErrors").innerHTML = errs.map(e=>'<div class="login-error">'+esc(e)+'</div>').join(""); return; }
    const btn = $("#pwBtn"); btn.disabled = true; btn.textContent = "Čuvanje...";
    try{
      const { error } = await sb.auth.updateUser({ password: p1 });
      if(error){
        $("#formErrors").innerHTML = '<div class="login-error">'+esc(error.message||"Greška pri promeni lozinke.")+'</div>';
        return;
      }
      AuditService.log("Promena lozinke", "user:"+AppState.currentUser.id, AppState.currentUser.name);
      UI.closeModal(); UI.toast("Lozinka je promenjena.","ok");
    }catch(e){
      console.error(e);
      $("#formErrors").innerHTML = '<div class="login-error">Greška pri povezivanju sa bazom.</div>';
    }finally{
      if($("#pwBtn")){ $("#pwBtn").disabled = false; $("#pwBtn").textContent = "Sačuvaj lozinku"; }
    }
  },

  /* ---------- PROFIL ---------- */
  renderProfile(){
    const u = AppState.currentUser;
    const e = ReportService.calculateEmployeeMetrics().find(x=>x.user.id===u.id);
    $("#pageContent").innerHTML =
      '<div class="card" style="display:flex;gap:16px;align-items:center">'+avatarHtml(u,56)+
      '<div style="flex:1"><h2>'+esc(u.name)+'</h2><p class="muted">'+esc(u.email)+' · '+ROLES[u.role].label+' · '+esc(u.department)+'</p></div>'+
      '<button class="btn" onclick="UI.openPasswordForm()">Promeni lozinku</button>'+
      '<button class="btn btn-danger" onclick="UI.logout()">Odjavi se</button></div>'+
      '<div class="grid-kpi">'+
      '<div class="kpi"><div class="k-label">Moji otvoreni taskovi</div><div class="k-value">'+e.open+'</div></div>'+
      '<div class="kpi k-mint"><div class="k-label">Završeni</div><div class="k-value">'+e.done+'</div></div>'+
      '<div class="kpi k-red"><div class="k-label">U kašnjenju</div><div class="k-value">'+e.late+'</div></div>'+
      '<div class="kpi"><div class="k-label">Moj indeks efikasnosti</div><div class="k-value">'+e.index+'</div></div></div>'+
      '<div class="page-actions"><button class="btn btn-primary" onclick="AppState.filters.quick=\'moji\';UI.go(\'mytasks\')">Otvori moje taskove</button></div>';
  }
};

/* =====================================================================
   INIT
   ===================================================================== */
async function initApp(){
  document.addEventListener("click", e=>{
    const p = $("#notifPanel");
    if(p && !p.classList.contains("hidden") && !p.contains(e.target) && !e.target.closest(".icon-btn")) p.classList.add("hidden");
  });
  try{
    if(await AuthService.restoreSession()){
      await DataService.loadData();
      UI.enterApp();
    } else {
      UI.renderLogin();
    }
  }catch(e){
    console.error(e);
    UI.renderLogin();
    const el = $("#loginError");
    el.textContent = "Greška pri povezivanju sa Supabase bazom. Proveri SUPABASE_URL / SUPABASE_ANON_KEY i internet konekciju.";
    el.classList.remove("hidden");
  }
}
// Globalni pristup za konzolu/testove
window.App = {AppState, DataService, AuthService, PermissionService, TaskService, ReportService, NotificationService, AuditService, UI, initApp};
window.UI = UI;
document.addEventListener("DOMContentLoaded", initApp);
</script>

<!-- =====================================================================
SUPABASE PLAN — SQL šema i uputstvo
>>> STATUS v2.0: MIGRACIJA ZAVRŠENA — aplikacija radi nad Supabase bazom.
    Koraci 1-6 ispod su ODRAĐENI i ostaju kao dokumentacija/šema za obnovu.
    Sledeći koraci: RLS politike (fajl flowcore_rls.sql), pa Storage bucket
    "task-attachments" za prave priloge (sada je prilog samo naziv fajla).

1) Napraviti projekat na supabase.com (Free Tier), uneti URL i anon key
   u konstante SUPABASE_URL / SUPABASE_ANON_KEY na vrhu skript bloka.
2) Dodati skript tag: src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
3) U StorageService zameniti localStorage pozive Supabase upitima —
   interfejs read/write ostaje isti, ostatak aplikacije se ne menja.
4) Login: AuthService.loginUser -> supabase.auth.signInWithPassword.
   Test lozinke iz seed-a se tada uklanjaju iz tabele users.
5) Prilozi: umesto naziva fajla, upload u Supabase Storage bucket
   'task-attachments' i čuvanje putanje u task_attachments.storage_path.

-- ===================== SQL ŠEMA =====================
create table departments (
  id uuid primary key default gen_random_uuid(),
  name text not null unique
);
create table categories (
  id uuid primary key default gen_random_uuid(),
  name text not null unique
);
create table users (
  id uuid primary key references auth.users(id),
  name text not null,
  email text not null unique,
  role text not null check (role in ('superadmin','menadzment','teamlead','dispecer','finansije','voznipark')),
  department_id uuid references departments(id),
  color text,
  created_at timestamptz default now()
);
create table tasks (
  id uuid primary key default gen_random_uuid(),
  title text not null,
  description text default '',
  department_id uuid references departments(id),
  category_id uuid references categories(id),
  status text not null default 'Novo',
  priority text not null default 'Normalan',
  created_by uuid references users(id),
  assigned_to uuid references users(id),
  created_at timestamptz default now(),
  updated_at timestamptz default now(),
  due_date timestamptz,
  started_at timestamptz,
  first_response_at timestamptz,
  completed_at timestamptz,
  estimated_minutes int,
  actual_minutes int,
  tags text[] default '{}',
  blocked_reason text default '',
  waiting_for text default '',
  is_archived boolean default false
);
create table task_participants (
  task_id uuid references tasks(id) on delete cascade,
  user_id uuid references users(id) on delete cascade,
  primary key (task_id, user_id)
);
create table task_comments (
  id uuid primary key default gen_random_uuid(),
  task_id uuid references tasks(id) on delete cascade,
  user_id uuid references users(id),
  text text not null,
  internal boolean default false,
  created_at timestamptz default now()
);
create table task_checklist (
  id uuid primary key default gen_random_uuid(),
  task_id uuid references tasks(id) on delete cascade,
  label text not null,
  done boolean default false,
  required boolean default false,
  position int default 0
);
create table task_attachments (
  id uuid primary key default gen_random_uuid(),
  task_id uuid references tasks(id) on delete cascade,
  name text not null,
  storage_path text,          -- putanja u Supabase Storage bucket-u
  added_by uuid references users(id),
  added_at timestamptz default now()
);
create table notifications (
  id uuid primary key default gen_random_uuid(),
  user_id uuid references users(id) on delete cascade,
  task_id uuid references tasks(id) on delete set null,
  text text not null,
  read boolean default false,
  created_at timestamptz default now()
);
create table audit_logs (
  id uuid primary key default gen_random_uuid(),
  at timestamptz default now(),
  user_id uuid references users(id),
  action text not null,
  entity text,
  details text
);
create table time_logs (
  id uuid primary key default gen_random_uuid(),
  task_id uuid references tasks(id) on delete cascade,
  user_id uuid references users(id),
  minutes int not null,
  note text,
  created_at timestamptz default now()
);

-- ===================== ROW LEVEL SECURITY (osnovne napomene) =====================
-- alter table tasks enable row level security;  (i za ostale tabele)
--
-- Pomoćna funkcija: current_user_role() čita rolu iz users tabele za auth.uid().
--
-- Politike za tasks (SELECT):
--  * superadmin, menadzment  -> USING (true)                 -- vide sve
--  * teamlead                -> USING (department_id = (select department_id from users where id = auth.uid())
--                                       or assigned_to = auth.uid() or created_by = auth.uid())
--  * finansije               -> USING (department_id = (select id from departments where name='Finansije')
--                                       or assigned_to = auth.uid() or created_by = auth.uid()
--                                       or exists (select 1 from task_participants tp where tp.task_id = tasks.id and tp.user_id = auth.uid()))
--  * dispecer / voznipark    -> USING (assigned_to = auth.uid() or created_by = auth.uid()
--                                       or exists (select 1 from task_participants tp where tp.task_id = tasks.id and tp.user_id = auth.uid()))
--
-- UPDATE/DELETE politike prate PermissionService.canUserEditTask / canUserDeleteTask.
-- notifications: USING (user_id = auth.uid()).
-- audit_logs: SELECT samo za superadmin i menadzment; INSERT za sve prijavljene.
===================================================================== -->
</body>
